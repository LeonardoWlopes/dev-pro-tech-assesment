pre-commit:
  parallel: true
  commands:
    verify-types:
      run: pnpm tsc
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm exec biome check --write --unsafe {staged_files}
      stage_fixed: true
pre-push:
  parallel: true
  commands:
    verify-types:
      run: pnpm tsc
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm exec biome check --write --unsafe {staged_files}
      stage_fixed: true
    commit-lint:
      run: pnpm dlx commitlint --from=HEAD~1
commit-msg:
  commands:
    commit-lint:
      run: pnpm dlx commitlint --edit
